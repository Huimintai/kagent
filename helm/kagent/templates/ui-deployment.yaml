apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent.fullname" . }}-ui
  namespace: {{ include "kagent.namespace" . }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      {{- include "kagent.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/ui-config: {{ include (print $.Template.BasePath "/ui-configmap.yaml") . | sha256sum }}
        {{- with .Values.ui.podAnnotations | default .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kagent.ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.ui.podSecurityContext | default .Values.podSecurityContext) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kagent.fullname" . }}-ui
      volumes:
        - name: nextjs-cache
          emptyDir:
            sizeLimit: {{ .Values.ui.volumes.nextjsCache }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.ui.volumes.tmp }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ui
          {{- with (.Values.ui.securityContext | default .Values.securityContext) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.ui.image.registry | default .Values.registry  }}/{{ .Values.ui.image.repository }}:{{ coalesce .Values.tag .Values.ui.image.tag .Chart.Version }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy | default .Values.imagePullPolicy }}
          env:
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "http://{{ include "kagent.fullname" . }}-controller.{{ include "kagent.namespace" . }}.svc.cluster.local:{{ .Values.controller.service.ports.port }}/api"
            {{- if .Values.ui.auth }}
            - name: SSO_REDIRECT_PATH
              value: {{ .Values.ui.auth.ssoRedirectPath | default "/oauth2/start" | quote }}
            {{- end }}
            {{- with .Values.ui.env }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.ui.github.enabled }}
            {{- if .Values.ui.github.instances }}
            - name: GITHUB_INSTANCES
              value: {{ .Values.ui.github.instances | toJson | quote }}
            {{- else }}
            - name: GITHUB_CLIENT_ID
              value: {{ .Values.ui.github.clientId | quote }}
            - name: GITHUB_CLIENT_SECRET
              value: {{ .Values.ui.github.clientSecret | quote }}
            - name: GITHUB_OAUTH_URL
              value: {{ .Values.ui.github.oauthUrl | quote }}
            - name: GITHUB_TOKEN_URL
              value: {{ .Values.ui.github.tokenUrl | quote }}
            - name: GITHUB_OAUTH_SCOPE
              value: {{ .Values.ui.github.scope | quote }}
            {{- end }}
            {{- if .Values.ui.github.redirectOrigin }}
            - name: GITHUB_OAUTH_REDIRECT_ORIGIN
              value: {{ .Values.ui.github.redirectOrigin | quote }}
            {{- end }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "kagent.fullname" . }}-ui-config
          ports:
            - name: http
              containerPort: {{ .Values.ui.service.ports.targetPort }}
              protocol: TCP
          volumeMounts:
            - name: nextjs-cache
              mountPath: /app/ui/.next/cache
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 1
            initialDelaySeconds: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30