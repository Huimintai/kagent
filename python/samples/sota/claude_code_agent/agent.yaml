apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: claude-code-agent
spec:
  description: "Anthropic Claude Code agent"
  type: BYO
  byo:
    deployment:
      image: cr.kagent.dev/kagent-dev/kagent/claude-code-runtime:latest
      env:
        - name: CLI_MODEL
          value: "claude-sonnet-4-20250514"
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 2Gi
